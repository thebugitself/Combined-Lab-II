<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID-Networkers Combined Lab 2 — Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #c0c0c0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.015) 2px,
                rgba(0, 255, 65, 0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        .lab-badge {
            text-align: center;
            margin-bottom: 2rem;
        }

        .lab-badge h1 {
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            color: #00ff41;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .lab-badge .subtitle {
            font-size: 0.75rem;
            color: #555;
            margin-top: 0.4rem;
            letter-spacing: 0.1em;
        }

        .login-container {
            border: 1px solid #1a1a1a;
            background: #0f0f0f;
            padding: 2.5rem 2.5rem 2rem;
            width: 380px;
            border-radius: 4px;
            position: relative;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -1px; left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff41, transparent);
        }

        .login-container h2 {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #00ff41;
            margin-bottom: 1.8rem;
            text-align: center;
            letter-spacing: 0.08em;
        }

        .field {
            margin-bottom: 1.2rem;
        }

        .field label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 0.4rem;
            font-family: 'Fira Code', monospace;
        }

        .field input {
            width: 100%;
            padding: 0.65rem 0.8rem;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #e0e0e0;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            border-radius: 2px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: #00ff41;
        }

        .btn-login {
            width: 100%;
            padding: 0.7rem;
            margin-top: 0.5rem;
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #00ff41;
            color: #0a0a0a;
        }

        .error-msg {
            background: rgba(255, 0, 0, 0.08);
            border: 1px solid #330000;
            color: #ff4444;
            padding: 0.6rem 0.8rem;
            font-size: 0.75rem;
            font-family: 'Fira Code', monospace;
            border-radius: 2px;
            margin-bottom: 1.2rem;
            text-align: center;
        }

        .hint {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #1a1a1a;
            text-align: center;
            font-size: 0.7rem;
            color: #444;
            font-family: 'Fira Code', monospace;
        }

        .hint span {
            color: #00ff41;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="lab-badge">
        <h1>ID-Networkers</h1>
        <div class="subtitle">Combined Lab 2 &mdash; The XML Gateway</div>
    </div>

    <div class="login-container">
        <h2>&gt; Authentication Portal</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" autocomplete="off" required placeholder="enter username">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" required placeholder="enter password">
            </div>
            <button type="submit" class="btn-login">Authenticate &rarr;</button>
        </form>

        <div class="hint">
            Guest account &mdash; <span>guest</span> : <span>guest123</span>
        </div>
    </div>

    <footer>ID-NETWORKERS SECURITY LAB &bull; AUTHORIZED USE ONLY</footer>
</body>
</html>
